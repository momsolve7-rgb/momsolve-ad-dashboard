<!DOCTYPE html>
<html lang="ko">
<head>

<title>콘텐츠 광고 운영</title>
<style>
  body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;
       font-family:'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif;
       background:#0f1220;color:#e8eaf2;text-align:center;padding:24px}
  .box{max-width:420px;width:100%}
  h1{font-size:24px;margin:0 0 6px}
  p{color:#9aa0c0;font-size:14px;margin:0 0 28px}
  a.card{display:block;background:#191d31;border:1px solid #2a3050;border-radius:16px;
         padding:22px;margin-bottom:14px;text-decoration:none;color:#e8eaf2;transition:.12s}
  a.card:hover{border-color:#6c8cff;transform:translateY(-2px)}
  a.card .t{font-size:17px;font-weight:700}
  a.card .d{color:#9aa0c0;font-size:13px;margin-top:6px}
</style>
</head>
<body>
  <div class="box">
    <h1>📊 콘텐츠 광고 운영</h1>
    <p>들어갈 화면을 선택하세요. (로그인이 필요합니다)</p>
    <a class="card" href="./admin/"><div class="t">🛠 관리자</div><div class="d">전체 탭 — 내부 직원용</div></a>
    <a class="card" href="./editor/"><div class="t">🧑‍💻 편집자</div><div class="d">배정 · AI모델 — 외주 편집자용</div></a>
  </div>
